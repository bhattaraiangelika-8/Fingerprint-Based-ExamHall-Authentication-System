{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fingerprint Enrollment{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'fingerprint/css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="{% url 'fingerprint:home' %}" class="navbar-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12C2 6.5 6.5 2 12 2a10 10 0 0 1 8 4"/>
                    <path d="M5 19.5C5.5 18 6 15 6 12c0-.7.12-1.37.34-2"/>
                    <path d="M17.29 21.02c.12-.6.43-2.3.5-3.02"/>
                    <path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4"/>
                    <path d="M8.65 22c.21-.66.45-1.32.57-2"/>
                    <path d="M14 13.12c0 2.38 0 6.38-1 8.88"/>
                    <path d="M2 16h.01"/>
                    <path d="M21.8 16c.2-2 .131-5.354 0-6"/>
                    <path d="M9 6.8a6 6 0 0 1 9 5.2c0 .47 0 1.17-.02 2"/>
                </svg>
                Fingerprint Enrollment
            </a>
            <ul class="navbar-nav">
                <li><a href="{% url 'fingerprint:home' %}" class="{% block nav_home %}{% endblock %}">Dashboard</a></li>
                <li><a href="{% url 'fingerprint:enroll' %}" class="{% block nav_enroll %}{% endblock %}">Enroll</a></li>
                <li><a href="{% url 'fingerprint:verify' %}" class="{% block nav_verify %}{% endblock %}">Verify</a></li>
            </ul>
        </div>
    </nav>

    <div id="toast-container" class="toast-container"></div>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'fingerprint/js/toast.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
